<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>eatly</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="header__nav">
          <a href="/">
            <img src="./img/Logo.svg"logo" />
          </a>
          <ul class="header__list">
            <a href="#">
              <li class="header__link">Menu</li>
            </a>
            <a href="#">
              <li class="header__link">Blog</li>
            </a>
            <a href="#">
              <li class="header__link">Pricing</li>
            </a>
            <a href="#">
              <li class="header__link">Contact</li>
            </a>
          </ul>
          <div class="header__buttons">
            <button class="header__login">Login</button>
            <button class="header__signup">Sing up</button>
          </div>
          <button class="menu__btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </button>
        </nav>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="container">
          <div class="hero__wrapper">
            <div class="hero__head">
              <p class="hero__preview"></p>
              <h1 class="hero__title">
                Enjoy Foods All Over The <span>World</span>
              </h1>
              <p class="hero__text">
                Eatly help you set saving goals, earn cash back offers, Go to
                disclaimer for more details and get paychecks up to two days
                early. Get a <span>$20 bonus.</span>
              </p>
              <div class="hero__btn">
                <a href="" class="hero__btn__start">Get Started</a>
                <a href="" class="hero__btn__pro">Go Pro</a>
              </div>
              <div class="hero__stars">
                <img
                  class="hero__trust"
                  src="./img/trustpilot-1 1.svg"
                  alt=""
                />
                <img class="hero__star" src="./img/Star.svg" alt="#" />
                <p>4900+</p>
              </div>
            </div>
            <div class="hero__image">
              <img class="food__img" src="./img/Hero.png" alt="#" />
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./index.js"></script>
  </body>
</html>
